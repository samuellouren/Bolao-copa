    // blob URLs load and parent.location is writable).

      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;

; font-weight:700; font-size:13px; color:#fff;\">VL<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- MAIN -->\n  <main style=\"position:relative; z-index:5; max-width:1340px; margin:0 auto; padding:14px 28px 150px; display:grid; grid-template-columns:1fr 332px; gap:30px; align-items:start;\">\n\n    <section>\n      <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin:14px 0 22px;\">\n        <div>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:30px; letter-spacing:-.6px;\">3ª Rodada<\u002Fdiv>\n          <div style=\"margin-top:5px; color:#9a9ed0; font-size:14px;\">Grupo da Morte · 6 jogos para cravar<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:10px; padding:10px 16px; border-radius:14px; background:rgba(255,93,162,.08); border:1px solid rgba(255,93,162,.28);\">\n          <span style=\"font-size:12px; color:#ffb9d6; text-transform:uppercase; letter-spacing:1px;\">portais fecham em<\u002Fspan>\n          <span style=\"font-family:'Space Grotesk',monospace; font-weight:700; font-size:18px; letter-spacing:1px; color:#ff8fc0; font-variant-numeric:tabular-nums;\">{{ countdown }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px;\">\n        <sc-for list=\"{{ matchesView }}\" as=\"m\" hint-placeholder-count=\"6\">\n          <div style=\"{{ m.cardGlow }}\">\n            <div style=\"background:linear-gradient(180deg,#1b1f48 0%,#15183a 100%); border-radius:18px; padding:18px 18px 16px; display:flex; flex-direction:column; gap:15px;\">\n\n              <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n                <div style=\"display:flex; align-items:center; gap:8px;\">\n                  <span style=\"font-size:11px; color:#8b8fc0; letter-spacing:.5px;\">{{ m.group }}<\u002Fspan>\n                  <span style=\"width:3px; height:3px; border-radius:50%; background:#54588a;\"><\u002Fspan>\n                  <span style=\"font-size:11px; color:#8b8fc0;\">{{ m.time }}<\u002Fspan>\n                <\u002Fdiv>\n                <span style=\"font-size:10.5px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; padding:4px 9px; border-radius:999px; border:1px solid; {{ m.statusStyle }}\">{{ m.statusText }}<\u002Fspan>\n              <\u002Fdiv>\n\n              <div style=\"display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px;\">\n                <div style=\"display:flex; flex-direction:column; align-items:center; gap:7px;\">\n                  <div style=\"width:50px; height:50px; border-radius:50%; border:2px solid rgba(255,255,255,.16); display:flex; align-items:center; justify-content:center; font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:13px; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.7); {{ m.hStyle }}\">{{ m.hCode }}<\u002Fdiv>\n                  <div style=\"font-size:13px; font-weight:500; color:#e7e9ff; text-align:center;\">{{ m.hName }}<\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display:flex; align-items:center; gap:12px;\">\n                  <div style=\"display:flex; flex-direction:column; align-items:center; gap:4px;\">\n                    <button type=\"button\" onclick=\"{{ m.onIncH }}\" style=\"width:26px; height:24px; border-radius:8px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05); color:#cfd2ff; font-size:15px; cursor:pointer; line-height:1; padding:0;\" style-hover=\"background:rgba(255,255,255,.12);\">+<\u002Fbutton>\n                    <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:34px; min-width:34px; text-align:center; line-height:1; font-variant-numeric:tabular-nums;\">{{ m.hShow }}<\u002Fdiv>\n                    <button type=\"button\" onclick=\"{{ m.onDecH }}\" style=\"width:26px; height:24px; border-radius:8px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05); color:#cfd2ff; font-size:15px; cursor:pointer; line-height:1; padding:0;\" style-hover=\"background:rgba(255,255,255,.12);\">−<\u002Fbutton>\n                  <\u002Fdiv>\n                  <div style=\"font-size:15px; color:#54588a; font-weight:600;\">×<\u002Fdiv>\n                  <div style=\"display:flex; flex-direction:column; align-items:center; gap:4px;\">\n                    <button type=\"button\" onclick=\"{{ m.onIncA }}\" style=\"width:26px; height:24px; border-radius:8px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05); color:#cfd2ff; font-size:15px; cursor:pointer; line-height:1; padding:0;\" style-hover=\"background:rgba(255,255,255,.12);\">+<\u002Fbutton>\n                    <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:34px; min-width:34px; text-align:center; line-height:1; font-variant-numeric:tabular-nums;\">{{ m.aShow }}<\u002Fdiv>\n                    <button type=\"button\" onclick=\"{{ m.onDecA }}\" style=\"width:26px; height:24px; border-radius:8px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05); color:#cfd2ff; font-size:15px; cursor:pointer; line-height:1; padding:0;\" style-hover=\"background:rgba(255,255,255,.12);\">−<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display:flex; flex-direction:column; align-items:center; gap:7px;\">\n                  <div style=\"width:50px; height:50px; border-radius:50%; border:2px solid rgba(255,255,255,.16); display:flex; align-items:center; justify-content:center; font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:13px; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.7); {{ m.aStyle }}\">{{ m.aCode }}<\u002Fdiv>\n                  <div style=\"font-size:13px; font-weight:500; color:#e7e9ff; text-align:center;\">{{ m.aName }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ showCrowd }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex; align-items:center; justify-content:center; gap:8px; padding-top:2px;\">\n                  <span style=\"font-size:11.5px; color:#8b8fc0;\">a galera crava<\u002Fspan>\n                  <span style=\"font-size:12px; font-weight:600; color:#cfd2ff; padding:2px 9px; border-radius:999px; background:rgba(255,255,255,.05);\">{{ m.crowd }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <div style=\"height:1px; background:rgba(255,255,255,.07);\"><\u002Fdiv>\n\n              <div style=\"display:flex; align-items:center; justify-content:space-between; gap:8px;\">\n                <span style=\"font-size:11px; color:#8b8fc0; white-space:nowrap;\">energia mística<\u002Fspan>\n                <div style=\"display:flex; gap:5px;\">\n                  <button type=\"button\" onclick=\"{{ m.onC1 }}\" style=\"font-size:10.5px; font-weight:600; padding:5px 9px; border-radius:999px; border:1px solid; cursor:pointer; {{ m.c1Style }}\">Palpite<\u002Fbutton>\n                  <button type=\"button\" onclick=\"{{ m.onC2 }}\" style=\"font-size:10.5px; font-weight:600; padding:5px 9px; border-radius:999px; border:1px solid; cursor:pointer; {{ m.c2Style }}\">Intuição<\u002Fbutton>\n                  <button type=\"button\" onclick=\"{{ m.onC3 }}\" style=\"font-size:10.5px; font-weight:600; padding:5px 9px; border-radius:999px; border:1px solid; cursor:pointer; {{ m.c3Style }}\">Premonição<\u002Fbutton>\n                <\u002Fdiv>\n                <span style=\"font-size:11.5px; font-weight:700; color:#f2c14e; white-space:nowrap;\">{{ m.potential }}<\u002Fspan>\n              <\u002Fdiv>\n\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- VIDENTE SIDEBAR -->\n    <aside style=\"position:sticky; top:24px; display:flex; flex-direction:column; gap:18px;\">\n      <div style=\"position:relative; border-radius:22px; padding:24px 22px; background:linear-gradient(180deg,#221a4a 0%,#171436 100%); border:1px solid rgba(176,142,255,.22); box-shadow:0 24px 50px -28px rgba(0,0,0,.8); overflow:hidden;\">\n        <div aria-hidden=\"true\" style=\"position:absolute; top:-30px; right:-20px; width:120px; height:120px; border-radius:50%; background:radial-gradient(circle, rgba(255,93,162,.22), transparent 70%);\"><\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; align-items:center; text-align:center; position:relative;\">\n          <div style=\"position:relative; animation:cdv-float 5s ease-in-out infinite;\">\n            <div style=\"width:88px; height:88px; border-radius:50%; background:radial-gradient(circle at 33% 28%, #ffffff 0%, #ffd9ef 14%, #c79bf0 44%, #7a52c8 72%, #2c1a63 100%); box-shadow:0 0 34px rgba(199,155,240,.5), inset 0 -10px 20px rgba(20,8,48,.55);\"><\u002Fdiv>\n            <div style=\"position:absolute; top:20px; left:24px; color:#fff; font-size:12px; opacity:.85;\">✦<\u002Fdiv>\n            <div style=\"position:absolute; bottom:-7px; left:50%; transform:translateX(-50%); width:46px; height:12px; border-radius:0 0 10px 10px; background:linear-gradient(#caa24a,#6f521b);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:18px; font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:18px;\">Madame Placar<\u002Fdiv>\n          <div style=\"margin-top:3px; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#b39ae0;\">sua vidente de plantão<\u002Fdiv>\n          <div style=\"margin-top:16px; padding:14px 16px; border-radius:14px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);\">\n            <p style=\"margin:0; font-family:'Newsreader',serif; font-style:italic; font-size:15.5px; line-height:1.5; color:#f0ecff;\">\"{{ vQuote }}\"<\u002Fp>\n            <div style=\"margin-top:10px; font-size:11px; color:#9a9ed0;\">— {{ vBy }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border-radius:18px; padding:18px 20px; background:linear-gradient(180deg,#1b1f48,#15183a); border:1px solid rgba(255,255,255,.08); display:flex; flex-direction:column; gap:14px;\">\n        <div style=\"font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:#8b8fc0;\">seus poderes<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:14px;\">\n          <div style=\"width:54px; height:54px; border-radius:50%; display:flex; align-items:center; justify-content:center; {{ ringStyle }}\">\n            <div style=\"width:42px; height:42px; border-radius:50%; background:#15183a; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px;\">{{ pct }}%<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:13px; font-weight:600;\">Rodada em andamento<\u002Fdiv>\n            <div style=\"font-size:12px; color:#9a9ed0;\">{{ progressText }} cravados<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:1px; background:rgba(255,255,255,.07);\"><\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between;\">\n          <div><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:19px;\">3º<\u002Fdiv><div style=\"font-size:11px; color:#8b8fc0;\">no bolão<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:19px; color:#4be3a0;\">8<\u002Fdiv><div style=\"font-size:11px; color:#8b8fc0;\">cravadas seguidas<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:19px; color:#f2c14e;\">73%<\u002Fdiv><div style=\"font-size:11px; color:#8b8fc0;\">premonição<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fmain>\n\n  <!-- STICKY SEAL FOOTER -->\n  <footer style=\"position:sticky; bottom:0; z-index:20; background:rgba(11,14,36,.86); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,.09);\">\n    <div style=\"max-width:1340px; margin:0 auto; padding:14px 28px; display:flex; align-items:center; justify-content:space-between; gap:24px;\">\n      <div style=\"display:flex; align-items:center; gap:16px; flex:1; min-width:0;\">\n        <div style=\"font-size:13px; color:#cfd2ff; white-space:nowrap; font-weight:600;\">{{ progressText }}<\u002Fdiv>\n        <div style=\"flex:1; max-width:340px; height:7px; border-radius:999px; background:rgba(255,255,255,.08); overflow:hidden;\">\n          <div style=\"height:100%; border-radius:999px; background:linear-gradient(90deg,#ff5da2,#f2c14e); width:{{ pctWidth }};\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button type=\"button\" onclick=\"{{ onSeal }}\" style=\"display:flex; align-items:center; gap:10px; padding:14px 26px; border-radius:14px; border:1px solid; font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:15px; {{ sealStyle }}\">\n        <span style=\"font-size:15px;\">✦<\u002Fspan>{{ sealLabel }}\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1340,&quot;height&quot;:900},&quot;primaryAccent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;gold&quot;,&quot;magenta&quot;,&quot;cyan&quot;],&quot;default&quot;:&quot;gold&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showCrowd&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;mysticCopy&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  matchDefs = [\n    { id:'m1', group:'Grupo C', time:'Hoje 13:00', crowd:'2 × 0',\n      h:{code:'BRA',name:'Brasil',c1:'#009739',c2:'#ffcc29'}, a:{code:'SRB',name:'Sérvia',c1:'#c6363c',c2:'#16335b'} },\n    { id:'m2', group:'Grupo D', time:'Hoje 16:00', crowd:'1 × 1',\n      h:{code:'ARG',name:'Argentina',c1:'#75aadb',c2:'#dfe6ef'}, a:{code:'MEX',name:'México',c1:'#006847',c2:'#ce1126'} },\n    { id:'m3', group:'Grupo F', time:'Hoje 19:00', crowd:'2 × 1',\n      h:{code:'FRA',name:'França',c1:'#0055a4',c2:'#ef4135'}, a:{code:'CRO',name:'Croácia',c1:'#c8102e',c2:'#1d4ea2'} },\n    { id:'m4', group:'Grupo E', time:'Amanhã 13:00', crowd:'1 × 2',\n      h:{code:'ENG',name:'Inglaterra',c1:'#cf142b',c2:'#012169'}, a:{code:'ESP',name:'Espanha',c1:'#aa151b',c2:'#f1bf00'} },\n    { id:'m5', group:'Grupo G', time:'Amanhã 16:00', crowd:'1 × 1',\n      h:{code:'POR',name:'Portugal',c1:'#006600',c2:'#d52b1e'}, a:{code:'GER',name:'Alemanha',c1:'#1a1a1a',c2:'#dd0000'} },\n    { id:'m6', group:'Grupo H', time:'Amanhã 19:00', crowd:'0 × 0',\n      h:{code:'NED',name:'Holanda',c1:'#ae1c28',c2:'#21468b'}, a:{code:'URU',name:'Uruguai',c1:'#7bafd4',c2:'#001489'} },\n  ];\n\n  state = { guesses:{}, sealed:false, tipIndex:0, secondsLeft: 2*3600 + 14*60 + 39 };\n\n  componentDidMount() {\n    this._t = setInterval(() => this.setState(s => ({ secondsLeft: s.secondsLeft > 0 ? s.secondsLeft - 1 : 0 })), 1000);\n    this._tip = setInterval(() => this.setState(s => ({ tipIndex: s.tipIndex + 1 })), 5500);\n  }\n  componentWillUnmount() { clearInterval(this._t); clearInterval(this._tip); }\n\n  tips() {\n    if (this.props.mysticCopy === false) {\n      return [\n        { quote:'Confira os desfalques e suspensos antes de cravar o placar.', by:'Central do Bolão' },\n        { quote:'Jogos decisivos de grupo costumam ter menos gols. Calibre seus chutes.', by:'Central do Bolão' },\n        { quote:'Premonição vale 3× os pontos. Use só quando tiver convicção.', by:'Central do Bolão' },\n      ];\n    }\n    return [\n      { quote:'Os astros sussurram um empate amargo no jogo da França… ou era só fome minha?', by:'Madame Placar' },\n      { quote:'Sinto uma zebra galopando pela rodada. Confie na intuição, não no figurinha.', by:'Madame Placar' },\n      { quote:'A bola de cristal embaçou no clássico. Quando embaça, chute com o coração.', by:'Madame Placar' },\n      { quote:'Vejo… vejo… um gol nos acréscimos. Anote, mas não me processe se vier de pênalti.', by:'Madame Placar' },\n      { quote:'Até vidente leva frango, querido. Humildade também pontua.', by:'Madame Placar' },\n    ];\n  }\n\n  adjust(id, side, d) {\n    this.setState(s => {\n      const g = { ...s.guesses };\n      const cur = g[id] ? { ...g[id] } : { h:null, a:null, conf:0 };\n      const base = cur[side] == null ? 0 : cur[side];\n      cur[side] = Math.max(0, Math.min(15, base + d));\n      if (cur.conf === 0) cur.conf = 1;\n      g[id] = cur;\n      return { guesses: g, sealed: false };\n    });\n  }\n  setConf(id, level) {\n    this.setState(s => {\n      const g = { ...s.guesses };\n      const cur = g[id] ? { ...g[id] } : { h:null, a:null, conf:0 };\n      cur.conf = level;\n      g[id] = cur;\n      return { guesses: g, sealed: false };\n    });\n  }\n  sealAll() {\n    const g = this.state.guesses;\n    const done = this.matchDefs.every(m => g[m.id] && g[m.id].h != null && g[m.id].a != null);\n    if (done) this.setState({ sealed: true });\n  }\n  pad(n) { return n < 10 ? '0' + n : '' + n; }\n\n  renderVals() {\n    const accent = { gold:'#f2c14e', magenta:'#ff5da2', cyan:'#4be3a0' }[this.props.primaryAccent ?? 'gold'];\n    const showCrowd = this.props.showCrowd ?? true;\n    const g = this.state.guesses;\n    const sealed = this.state.sealed;\n    const isDone = m => g[m.id] && g[m.id].h != null && g[m.id].a != null;\n    const completedCount = this.matchDefs.filter(isDone).length;\n    const total = this.matchDefs.length;\n    const allDone = completedCount === total;\n    const pct = Math.round(completedCount / total * 100);\n    const confLabels = ['Palpite','Intuição','Premonição'];\n    const potentials = [0,10,20,35];\n\n    const orb = on => on\n      ? { background:accent, borderColor:accent, color:'#1a1330', boxShadow:`0 0 14px ${accent}66` }\n      : { background:'rgba(255,255,255,.04)', borderColor:'rgba(255,255,255,.14)', color:'#a3a7d4', boxShadow:'none' };\n\n    const matchesView = this.matchDefs.map(m => {\n      const gg = g[m.id] || { h:null, a:null, conf:0 };\n      const completed = gg.h != null && gg.a != null;\n      return {\n        id:m.id, group:m.group, time:m.time, crowd:m.crowd,\n        hCode:m.h.code, hName:m.h.name, aCode:m.a.code, aName:m.a.name,\n        hStyle:{ background:`linear-gradient(135deg, ${m.h.c1} 0 50%, ${m.h.c2} 50% 100%)` },\n        aStyle:{ background:`linear-gradient(135deg, ${m.a.c1} 0 50%, ${m.a.c2} 50% 100%)` },\n        hShow: gg.h == null ? '–' : String(gg.h),\n        aShow: gg.a == null ? '–' : String(gg.a),\n        onIncH:() => this.adjust(m.id,'h',1), onDecH:() => this.adjust(m.id,'h',-1),\n        onIncA:() => this.adjust(m.id,'a',1), onDecA:() => this.adjust(m.id,'a',-1),\n        onC1:() => this.setConf(m.id,1), onC2:() => this.setConf(m.id,2), onC3:() => this.setConf(m.id,3),\n        c1Style: orb(gg.conf === 1), c2Style: orb(gg.conf === 2), c3Style: orb(gg.conf === 3),\n        completed,\n        potential: '+' + (gg.conf > 0 ? potentials[gg.conf] : 10) + ' cristais',\n        statusText: sealed && completed ? 'Selado ✦' : completed ? 'Pronto' : 'Sem palpite',\n        statusStyle: sealed && completed\n          ? { color:'#1a1330', background:accent, borderColor:accent }\n          : completed\n            ? { color:accent, background:`${accent}1a`, borderColor:`${accent}55` }\n            : { color:'#8b8fc0', background:'rgba(255,255,255,.03)', borderColor:'rgba(255,255,255,.10)' },\n        cardGlow: completed\n          ? { borderRadius:'18px', border:`1px solid ${accent}55`, boxShadow:`0 0 0 1px ${accent}22, 0 20px 46px -22px ${accent}55, 0 10px 30px -16px rgba(0,0,0,.6)` }\n          : { borderRadius:'18px', border:'1px solid rgba(255,255,255,.08)', boxShadow:'0 12px 32px -20px rgba(0,0,0,.7)' },\n      };\n    });\n\n    const tips = this.tips();\n    const tip = tips[this.state.tipIndex % tips.length];\n    const s = this.state.secondsLeft;\n    const countdown = this.pad(Math.floor(s/3600)) + ':' + this.pad(Math.floor(s%3600/60)) + ':' + this.pad(s%60);\n\n    return {\n      matchesView, showCrowd, countdown,\n      vQuote: tip.quote, vBy: tip.by,\n      pct, pctWidth: pct + '%',\n      progressText: completedCount + '/' + total,\n      ringStyle: { background:`conic-gradient(${accent} ${pct*3.6}deg, rgba(255,255,255,.09) 0)` },\n      allDone, sealed,\n      onSeal: () => this.sealAll(),\n      sealLabel: sealed ? 'Palpites selados — que os astros te ouçam' : allDone ? 'Selar meus palpites' : 'Complete os 6 palpites',\n      sealStyle: sealed\n        ? { background:'rgba(255,255,255,.06)', color:accent, borderColor:`${accent}66`, cursor:'default' }\n        : allDone\n          ? { background:accent, color:'#1a1330', borderColor:accent, cursor:'pointer', boxShadow:`0 14px 30px -10px ${accent}88` }\n          : { background:'rgba(255,255,255,.05)', color:'#6f73a6', borderColor:'rgba(255,255,255,.08)', cursor:'not-allowed' },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Chute do Vidente - Palpites.dc"}
